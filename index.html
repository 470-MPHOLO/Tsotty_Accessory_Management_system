<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsotty Accessories | Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --gold: #C9A84C;
            --gold2: #DAB95E;
            --light-bg: #F5F7FA;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --text: #1E293B;
            --muted: #64748B;
            --green: #10B981;
            --red: #EF4444;
            --blue: #3B82F6;
            --orange: #F97316;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--light-bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
        h1, h2, h3 { font-family: 'DM Serif Display', serif; }

        #loginScreen { position: fixed; inset: 0; background: var(--light-bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
        .login-card h1 { color: var(--gold); font-size: 2rem; text-align: center; }
        .login-card p { color: var(--muted); text-align: center; margin-bottom: 32px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
        .field input { width: 100%; background: var(--white); border: 1px solid var(--border); padding: 12px 14px; border-radius: 8px; }
        .btn-gold { width: 100%; background: var(--gold); color: white; font-weight: 700; padding: 13px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-gold:hover { background: var(--gold2); }

        #mainApp { display: none; }
        header { background: var(--white); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        header h1 { color: var(--gold); font-size: 1.6rem; }
        .logout-btn { background: transparent; border: 1px solid var(--border); padding: 8px 18px; border-radius: 8px; cursor: pointer; }
        .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

        main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .stat-card .label { font-size: .78rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-family: 'DM Serif Display', serif; }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .inv-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .inv-card .prod-name { font-size: 1.1rem; font-weight: 600; }
        .inv-card .prod-price { font-size: .85rem; color: var(--muted); margin-bottom: 12px; }
        .stock-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
        .stock-num { font-size: 2rem; font-family: 'DM Serif Display', serif; }
        .stock-num.low { color: var(--orange); }
        .stock-num.critical { color: var(--red); }
        .stock-num.ok { color: var(--green); }
        .inv-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: .8rem; }
        .btn-primary { background: var(--gold); color: white; }
        .btn-success { background: var(--green); color: white; }
        .btn-export { background: #DBEAFE; color: var(--blue); }
        .btn-ghost { background: var(--white); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger { background: #FEE2E2; color: var(--red); border: 1px solid #FECACA; }
        .btn-danger:hover { background: #FECACA; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200; }
        .modal.active { display: flex; }
        .modal-box { background: var(--white); border-radius: 16px; width: 100%; max-width: 500px; padding: 32px; max-height: 90vh; overflow-y: auto; }
        .modal-box h3 { color: var(--gold); margin-bottom: 20px; }
        .modal-field { margin-bottom: 14px; }
        .modal-field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        .modal-field input, .modal-field select { width: 100%; background: var(--white); border: 1px solid var(--border); padding: 10px 13px; border-radius: 8px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions .btn { flex: 1; }
        .history-entry { background: #F8FAFC; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .svc-name { font-weight: 600; margin-bottom: 4px; }
        .svc-meta { font-size: .75rem; color: var(--muted); }
        #loginError { color: var(--red); font-size: .85rem; text-align: center; margin-top: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .warning-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: .7rem; font-weight: 600; margin-top: 8px; }
        .warning-low { background: #FEF3C7; color: var(--orange); }
        .warning-critical { background: #FEE2E2; color: var(--red); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h1>Tsotty Accessories</h1>
        <p>Inventory & Sales Management System</p>
        <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="staff@tsotty.co.ls"></div>
        <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
        <button class="btn-gold" id="loginBtn">Sign In</button>
        <div id="loginError"></div>
    </div>
</div>

<div id="mainApp">
    <header>
        <div><h1>Tsotty Accessories</h1><p>Inventory & Sales Management</p></div>
        <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-card"><div class="label">Product Types</div><div class="value" id="i-types">0</div></div>
            <div class="stat-card"><div class="label">Total Stock</div><div class="value" style="color:var(--gold)" id="i-stock">0</div></div>
            <div class="stat-card"><div class="label">Total Sold</div><div class="value" style="color:var(--green)" id="i-sold">0</div></div>
            <div class="stat-card"><div class="label">Low Stock (30%)</div><div class="value" style="color:var(--orange)" id="i-low">0</div></div>
            <div class="stat-card"><div class="label">Revenue</div><div class="value" style="color:var(--blue);font-size:1.5rem" id="i-rev">M0</div></div>
        </div>

        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="btnAddProduct">+ Add Product</button>
            <button class="btn btn-success" id="btnRecordSale">Record Sale</button>
            <button class="btn btn-export" id="btnExportInventory">Export Excel</button>
        </div>

        <div id="invGrid" class="inv-grid"><p style="color:var(--muted);padding:40px 0;text-align:center">Loading inventory...</p></div>
    </main>
</div>

<div id="addProductModal" class="modal"><div class="modal-box"><h3>Add Product</h3><form id="addProductForm"><div class="modal-field"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. USB-C Cable" required></div><div class="modal-field"><label>Selling Price (M)</label><input type="number" id="pPrice" step="0.01" required></div><div class="modal-field"><label>Initial Stock</label><input type="number" id="pStock" min="0" value="0"></div><div class="modal-actions"><button type="submit" class="btn btn-primary">Add Product</button><button type="button" id="cancelAddProduct" class="btn btn-ghost">Cancel</button></div></form></div></div>

<div id="recordSaleModal" class="modal"><div class="modal-box"><h3>Record Sale</h3><form id="recordSaleForm"><div class="modal-field"><label>Product</label><select id="saleProduct" required><option value="">— Select —</option></select></div><div id="salePriceHint" style="font-size:.85rem;color:var(--muted);margin:-5px 0 10px;"></div><div class="modal-field"><label>Quantity</label><input type="number" id="saleQty" min="1" value="1" required></div><div class="modal-field"><label>Amount Received (M)</label><input type="number" id="saleAmount" step="0.01"></div><div class="modal-field"><label>Buyer Name</label><input type="text" id="saleBuyer" placeholder="Walk-in customer"></div><div class="modal-field"><label>Notes</label><input type="text" id="saleNotes" placeholder="Optional"></div><div class="modal-actions"><button type="submit" class="btn btn-success">Record Sale</button><button type="button" id="cancelSale" class="btn btn-ghost">Cancel</button></div></form></div></div>

<div id="restockModal" class="modal"><div class="modal-box"><h3>Restock Product</h3><input type="hidden" id="restockProductId"><p id="restockProductName" style="color:var(--gold);margin-bottom:16px;font-weight:600;"></p><div class="modal-field"><label>Units to Add</label><input type="number" id="restockQty" min="1" value="5"></div><div class="modal-actions"><button id="confirmRestock" class="btn btn-primary">Add Stock</button><button id="cancelRestock" class="btn btn-ghost">Cancel</button></div></div></div>

<div id="salesLogModal" class="modal"><div class="modal-box" style="max-width:550px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h3 id="salesLogTitle" style="margin:0">Sales Log</h3><button id="closeSalesLog" style="background:none;border:none;font-size:1.5rem;cursor:pointer">&times;</button></div><div id="salesLogContent"></div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAz7b-Nxt6hf8cVzy6TrukZVoDCNoN-IFw",
        authDomain: "cre8learn-institute.firebaseapp.com",
        projectId: "cre8learn-institute",
        storageBucket: "cre8learn-institute.firebasestorage.app",
        messagingSenderId: "278207843434",
        appId: "1:278207843434:web:97ee5e0067369cf2080e13"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const productsCollection = collection(db, 'tsotty_products');
    const salesCollection = collection(db, 'tsotty_sales');

    let allProducts = [];
    let allSales = [];

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // Check stock level and return warning info
    function getStockWarning(product) {
        const currentStock = product.stock || 0;
        const initialStock = product.initialStock || product.stock || 0;
        
        // If initial stock is 0, use current stock as baseline
        const baselineStock = initialStock > 0 ? initialStock : currentStock;
        const stockPercentage = baselineStock > 0 ? (currentStock / baselineStock) * 100 : 0;
        
        if (currentStock <= 0) {
            return { type: 'critical', message: 'Out of stock! Restock immediately.', color: 'critical' };
        } else if (stockPercentage <= 30) {
            return { type: 'low', message: `Low stock warning: Only ${currentStock} units left (${Math.round(stockPercentage)}% of original stock)`, color: 'low' };
        }
        return null;
    }

    window.openRestock = function(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        document.getElementById('restockProductId').value = productId;
        document.getElementById('restockProductName').textContent = product.name;
        openModal('restockModal');
    };

    window.viewSalesLog = function(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const logs = allSales.filter(s => s.productId === productId);
        document.getElementById('salesLogTitle').textContent = product.name + ' - Sales History';
        
        if (logs.length === 0) {
            document.getElementById('salesLogContent').innerHTML = '<p style="color:var(--muted);text-align:center;padding:24px">No sales recorded for this product yet.</p>';
        } else {
            const totalRevenue = logs.reduce((sum, s) => sum + parseFloat(s.amount || 0), 0);
            const totalUnits = logs.reduce((sum, s) => sum + (s.qty || 1), 0);
            document.getElementById('salesLogContent').innerHTML = logs.map(s => `
                <div class="history-entry">
                    <div class="svc-name">Qty: ${s.qty || 1} x M${((parseFloat(s.amount) || 0) / (s.qty || 1)).toFixed(2)} = <strong>M${parseFloat(s.amount || 0).toFixed(2)}</strong></div>
                    <div class="svc-meta">${s.buyer || 'Walk-in customer'} · ${s.createdAt?.toDate ? s.createdAt.toDate().toLocaleDateString() : new Date().toLocaleDateString()}${s.notes ? ' · ' + s.notes : ''}</div>
                </div>
            `).join('') + `
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-weight:700;text-align:right">
                    Total Revenue: M${totalRevenue.toFixed(2)} · ${totalUnits} units sold
                </div>
            `;
        }
        openModal('salesLogModal');
    };

    window.deleteProduct = async function(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        
        const hasSales = allSales.some(s => s.productId === productId);
        let confirmMessage = `Are you sure you want to delete "${product.name}"?`;
        if (hasSales) {
            confirmMessage += `\n\nWARNING: This product has ${allSales.filter(s => s.productId === productId).length} sale(s) recorded. Deleting will NOT delete the sales history.`;
        }
        
        if (!confirm(confirmMessage)) return;
        
        try {
            await deleteDoc(doc(db, 'tsotty_products', productId));
            await loadProducts();
            await loadSales();
            alert(`"${product.name}" has been deleted.`);
        } catch (error) {
            console.error('Error deleting product:', error);
            alert('Failed to delete product. Please try again.');
        }
    };

    function renderInventory() {
        // Count products with stock <= 30% of initial stock
        const lowStockCount = allProducts.filter(p => {
            const currentStock = p.stock || 0;
            const initialStock = p.initialStock || p.stock || 0;
            const baselineStock = initialStock > 0 ? initialStock : currentStock;
            const stockPercentage = baselineStock > 0 ? (currentStock / baselineStock) * 100 : 0;
            return stockPercentage <= 30 && currentStock > 0;
        }).length;
        
        const outOfStockCount = allProducts.filter(p => (p.stock || 0) <= 0).length;
        const totalLowStock = lowStockCount + outOfStockCount;
        
        const totalStock = allProducts.reduce((sum, p) => sum + (p.stock || 0), 0);
        const totalSold = allSales.reduce((sum, s) => sum + (s.qty || 1), 0);
        const totalRev = allSales.reduce((sum, s) => sum + parseFloat(s.amount || 0), 0);
        
        document.getElementById('i-types').textContent = allProducts.length;
        document.getElementById('i-stock').textContent = totalStock;
        document.getElementById('i-sold').textContent = totalSold;
        document.getElementById('i-low').textContent = totalLowStock;
        document.getElementById('i-rev').textContent = 'M' + totalRev.toFixed(2);
        
        const grid = document.getElementById('invGrid');
        if (allProducts.length === 0) {
            grid.innerHTML = '<p style="color:var(--muted);padding:40px 0;text-align:center">No products yet. Click "Add Product" to start.</p>';
            return;
        }
        
        grid.innerHTML = allProducts.map(product => {
            const productSales = allSales.filter(s => s.productId === product.id);
            const unitsSold = productSales.reduce((sum, s) => sum + (s.qty || 1), 0);
            const revenue = productSales.reduce((sum, s) => sum + parseFloat(s.amount || 0), 0);
            const currentStock = product.stock || 0;
            const initialStock = product.initialStock || product.stock || 0;
            const stockWarning = getStockWarning(product);
            
            let stockColorClass = 'ok';
            if (currentStock <= 0) stockColorClass = 'critical';
            else if (stockWarning && stockWarning.type === 'low') stockColorClass = 'low';
            
            let warningHtml = '';
            if (currentStock <= 0) {
                warningHtml = '<div class="warning-badge warning-critical">⚠ Out of stock - Restock now</div>';
            } else if (stockWarning) {
                warningHtml = `<div class="warning-badge warning-low">⚠ ${stockWarning.message}</div>`;
            }
            
            return `
                <div class="inv-card">
                    <div class="card-header">
                        <div class="prod-name">${escapeHtml(product.name)}</div>
                        <button onclick="deleteProduct('${product.id}')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:1.2rem;" title="Delete product">🗑️</button>
                    </div>
                    <div class="prod-price">Price: M${(product.price || 0).toFixed(2)}</div>
                    <div class="stock-row">
                        <div>
                            <div style="font-size:.75rem;color:var(--muted)">IN STOCK</div>
                            <div class="stock-num ${stockColorClass}">${currentStock}</div>
                        </div>
                        <div>
                            <div style="font-size:.75rem;color:var(--muted);text-align:right">SOLD</div>
                            <div style="font-size:1.6rem;font-family:serif;color:var(--green)">${unitsSold}</div>
                        </div>
                    </div>
                    <div style="font-size:.8rem;color:var(--muted);margin:8px 0">Revenue: M${revenue.toFixed(2)}</div>
                    ${warningHtml}
                    <div class="inv-actions">
                        <button class="btn btn-ghost" onclick="openRestock('${product.id}')">Restock</button>
                        <button class="btn btn-ghost" onclick="viewSalesLog('${product.id}')">Sales Log</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadProducts() {
        const q = query(productsCollection, orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    async function loadSales() {
        const q = query(salesCollection, orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allSales = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderInventory();
    }

    async function loadAllData() {
        await loadProducts();
        await loadSales();
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadAllData();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            document.getElementById('loginError').textContent = '';
        } catch (e) {
            document.getElementById('loginError').textContent = 'Invalid email or password';
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
    });

    document.getElementById('btnAddProduct').addEventListener('click', () => openModal('addProductModal'));
    document.getElementById('cancelAddProduct').addEventListener('click', () => closeModal('addProductModal'));
    
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('pName').value.trim();
        if (!name) return alert('Please enter a product name');
        const price = parseFloat(document.getElementById('pPrice').value) || 0;
        const stock = parseInt(document.getElementById('pStock').value) || 0;
        
        await addDoc(productsCollection, {
            name: name,
            price: price,
            stock: stock,
            initialStock: stock,
            createdAt: serverTimestamp()
        });
        closeModal('addProductModal');
        document.getElementById('addProductForm').reset();
        await loadAllData();
        alert(`Product "${name}" added successfully!`);
    });

    document.getElementById('btnRecordSale').addEventListener('click', () => {
        const select = document.getElementById('saleProduct');
        select.innerHTML = '<option value="">— Choose product —</option>' + 
            allProducts.map(p => `<option value="${p.id}" data-price="${p.price}" data-stock="${p.stock}">${escapeHtml(p.name)} (${p.stock || 0} in stock)</option>`).join('');
        document.getElementById('salePriceHint').textContent = '';
        document.getElementById('saleAmount').value = '';
        openModal('recordSaleModal');
    });
    
    document.getElementById('cancelSale').addEventListener('click', () => closeModal('recordSaleModal'));
    
    document.getElementById('saleProduct').addEventListener('change', (e) => {
        const opt = e.target.options[e.target.selectedIndex];
        const price = parseFloat(opt.dataset.price) || 0;
        const qty = parseInt(document.getElementById('saleQty').value) || 1;
        document.getElementById('saleAmount').value = (price * qty).toFixed(2);
        document.getElementById('salePriceHint').innerHTML = price ? `Unit price: M${price.toFixed(2)}` : '';
    });
    
    document.getElementById('saleQty').addEventListener('input', () => {
        const select = document.getElementById('saleProduct');
        const opt = select.options[select.selectedIndex];
        const price = parseFloat(opt?.dataset?.price) || 0;
        const qty = parseInt(document.getElementById('saleQty').value) || 1;
        if (price) document.getElementById('saleAmount').value = (price * qty).toFixed(2);
    });
    
    document.getElementById('recordSaleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const productId = document.getElementById('saleProduct').value;
        if (!productId) return alert('Please select a product');
        
        const product = allProducts.find(p => p.id === productId);
        const qty = parseInt(document.getElementById('saleQty').value) || 1;
        
        if (qty > (product?.stock || 0)) {
            return alert(`Only ${product?.stock || 0} unit(s) in stock`);
        }
        
        const amount = parseFloat(document.getElementById('saleAmount').value) || 0;
        const buyer = document.getElementById('saleBuyer').value.trim();
        const notes = document.getElementById('saleNotes').value.trim();
        
        await addDoc(salesCollection, {
            productId: productId,
            productName: product.name,
            qty: qty,
            amount: amount,
            buyer: buyer || 'Walk-in customer',
            notes: notes,
            createdAt: serverTimestamp()
        });
        
        await updateDoc(doc(db, 'tsotty_products', productId), {
            stock: (product.stock || 0) - qty
        });
        
        closeModal('recordSaleModal');
        document.getElementById('recordSaleForm').reset();
        await loadAllData();
        alert(`Sale recorded! ${qty} x ${product.name} sold for M${amount.toFixed(2)}`);
    });

    document.getElementById('confirmRestock').addEventListener('click', async () => {
        const productId = document.getElementById('restockProductId').value;
        const qty = parseInt(document.getElementById('restockQty').value) || 0;
        if (qty <= 0) return alert('Please enter a valid quantity');
        
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        
        const newStock = (product.stock || 0) + qty;
        await updateDoc(doc(db, 'tsotty_products', productId), {
            stock: newStock
        });
        
        closeModal('restockModal');
        await loadAllData();
        alert(`Restocked ${qty} units. New stock: ${newStock}`);
    });
    
    document.getElementById('cancelRestock').addEventListener('click', () => closeModal('restockModal'));
    document.getElementById('closeSalesLog').addEventListener('click', () => closeModal('salesLogModal'));

    document.getElementById('btnExportInventory').addEventListener('click', () => {
        if (allProducts.length === 0) return alert('No data to export');
        
        const wb = XLSX.utils.book_new();
        
        const stockRows = [['Product', 'Unit Price (M)', 'Current Stock', 'Initial Stock', 'Stock Percentage', 'Units Sold', 'Revenue (M)']];
        allProducts.forEach(p => {
            const sales = allSales.filter(s => s.productId === p.id);
            const unitsSold = sales.reduce((sum, s) => sum + (s.qty || 1), 0);
            const revenue = sales.reduce((sum, s) => sum + parseFloat(s.amount || 0), 0);
            const initialStock = p.initialStock || p.stock || 0;
            const stockPercentage = initialStock > 0 ? ((p.stock || 0) / initialStock) * 100 : 0;
            stockRows.push([p.name, (p.price || 0).toFixed(2), p.stock || 0, initialStock, stockPercentage.toFixed(1) + '%', unitsSold, revenue.toFixed(2)]);
        });
        const ws1 = XLSX.utils.aoa_to_sheet(stockRows);
        XLSX.utils.book_append_sheet(wb, ws1, 'Stock Levels');
        
        const saleRows = [['Product', 'Quantity', 'Amount (M)', 'Buyer', 'Notes', 'Date']];
        allSales.forEach(s => {
            saleRows.push([
                s.productName || '', s.qty || 1,
                parseFloat(s.amount || 0).toFixed(2),
                s.buyer || '', s.notes || '',
                s.createdAt?.toDate ? s.createdAt.toDate().toLocaleDateString() : new Date().toLocaleDateString()
            ]);
        });
        const ws2 = XLSX.utils.aoa_to_sheet(saleRows);
        XLSX.utils.book_append_sheet(wb, ws2, 'Sales History');
        
        XLSX.writeFile(wb, `Tsotty_Accessories_${new Date().toISOString().slice(0,10)}.xlsx`);
    });
</script>
</body>
</html>
